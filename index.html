<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>All We Are Impact Map</title>

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { margin:0; padding:0; }
#map { position:absolute; top:0; bottom:0; width:100%; }
</style>

</head>

<body>

<div id="map"></div>

<script>

mapboxgl.accessToken = 'pk.eyJ1Ijoicy1wZXJrIiwiYSI6ImNtbWU1amJyZDBiNjcyc3E0bmZubXVwdm8ifQ.-II8pwN1aLKbed_BQXf0cA';

const map = new mapboxgl.Map({
container: 'map',
style: 'mapbox://styles/mapbox/dark-v11',
center: [32.3,0.3],
zoom: 7
});

map.on('load', () => {

d3.csv("Impact_Map_Export - Sheet1.csv").then(function(data){

const geojson = {
type:"FeatureCollection",
features:data.map(d => ({
type:"Feature",
properties:{
Population:+d.Population
},
geometry:{
type:"Point",
coordinates:[+d.longitude,+d.latitude]
}
}))
};

map.addSource('sites', {
type: 'geojson',
data: geojson,
cluster: true,
clusterRadius: 50,
clusterMaxZoom: 12,
clusterProperties: {
people: ['+', ['get','Population']]
}
});

map.addLayer({
id:'clusters',
type:'circle',
source:'sites',
filter:['has','point_count'],
paint:{
'circle-color':'#E3BC47',
'circle-radius':[
'interpolate',
['linear'],
['get','people'],
0,18,
1000,28,
5000,40,
20000,55
],
'circle-stroke-width':2,
'circle-stroke-color':'#fff'
}
});

map.addLayer({
id:'cluster-count',
type:'symbol',
source:'sites',
filter:['has','point_count'],
layout:{
'text-field':['get','people'],
'text-size':16
},
paint:{
'text-color':'#000'
}
});

map.addLayer({
id:'points',
type:'circle',
source:'sites',
filter:['!', ['has','point_count']],
paint:{
'circle-color':'#E3BC47',
'circle-radius':6,
'circle-stroke-width':2,
'circle-stroke-color':'#fff'
}
});

});

});

</script>

</body>
</html>
