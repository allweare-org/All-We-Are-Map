<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>All We Are Impact Map</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>

body{
margin:0;
padding:0;
}

#map{
position:absolute;
top:0;
bottom:0;
width:100%;
}

/* ---- CONTROL COLUMN ---- */

.mapboxgl-ctrl-bottom-right{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
right:16px;
bottom:60px;
}

.mapboxgl-ctrl-group{
border-radius:12px !important;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.35) !important;
border:none;
}

.mapboxgl-ctrl-group button{
width:54px !important;
height:54px !important;
background:#ffffff !important;
}

.mapboxgl-ctrl-group button + button{
border-top:1px solid #e6e6e6 !important;
}

/* ---- MAP STYLE BUTTON ---- */

.map-style-button{
width:54px;
height:54px;
border-radius:12px;
border:2px solid rgba(255,255,255,0.85);
background:rgba(92,88,72,0.92);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 6px 18px rgba(0,0,0,0.35);
}

.map-style-button svg{
width:26px;
height:26px;
}

/* ---- ATTRIBUTION ---- */

.mapboxgl-ctrl-bottom-left{
left:auto !important;
right:16px !important;
bottom:8px !important;
}

.mapboxgl-ctrl-attrib{
font-size:11px !important;
background:rgba(255,255,255,0.85) !important;
border-radius:4px;
}

/* ---- POPUP ---- */

.mapboxgl-popup{
max-width:560px;
}

.mapboxgl-popup-content{
padding:0;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
font-family:Arial,sans-serif;
}

.mapboxgl-popup-close-button{
font-size:24px;
color:#666;
padding:8px 12px;
}

.popup-card{
background:#fff;
padding:22px 26px;
min-width:420px;
max-width:520px;
}

.popup-title{
font-size:24px;
margin-bottom:12px;
}

.popup-meta-row{
display:flex;
gap:18px;
margin-bottom:14px;
color:#666;
}

.popup-details{
font-size:15px;
line-height:1.6;
}

.popup-details strong{
color:#333;
}

</style>
</head>

<body>

<div id="map"></div>

<script>

mapboxgl.accessToken = 'YOUR_MAPBOX_TOKEN';

let currentStyle="dark";

const styles={
dark:'mapbox://styles/mapbox/dark-v11',
real:'mapbox://styles/mapbox/satellite-streets-v12'
};

const map=new mapboxgl.Map({
container:'map',
style:styles.dark,
center:[32.3,0.3],
zoom:5
});

/* Zoom buttons */

map.addControl(
new mapboxgl.NavigationControl({
showCompass:false
}),
'bottom-right'
);

/* ---- CUSTOM STYLE BUTTON ---- */

class StyleToggleControl{
onAdd(map){

this._map=map;

this._btn=document.createElement("button");
this._btn.className="map-style-button";

this._btn.innerHTML=`
<svg viewBox="0 0 24 24" fill="none">
<path d="M12 3L4 7L12 11L20 7L12 3Z" stroke="white" stroke-width="1.8"/>
<path d="M4 12L12 16L20 12" stroke="white" stroke-width="1.8"/>
<path d="M4 16.5L12 20.5L20 16.5" stroke="white" stroke-width="1.8"/>
</svg>
`;

this._btn.onclick=()=>{

const center=map.getCenter();
const zoom=map.getZoom();

currentStyle=currentStyle==="dark"?"real":"dark";

map.setStyle(styles[currentStyle]);

map.once("style.load",()=>{
map.jumpTo({center,zoom});
});

};

return this._btn;
}

onRemove(){
this._btn.parentNode.removeChild(this._btn);
this._map=null;
}
}

map.addControl(new StyleToggleControl(),"bottom-right");

</script>

</body>
</html>
