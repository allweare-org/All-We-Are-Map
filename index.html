<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>All We Are Impact Map</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
  margin: 0;
  padding: 0;
}

#map {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 100%;
}

.mapboxgl-popup {
  max-width: 560px;
}

.mapboxgl-popup-content {
  padding: 0;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  font-family: Arial, sans-serif;
}

.mapboxgl-popup-close-button {
  font-size: 24px;
  color: #666;
  padding: 8px 12px;
}

.popup-card {
  padding: 22px 26px;
  min-width: 420px;
  max-width: 520px;
}

.popup-title {
  font-size: 24px;
  font-weight: 500;
  line-height: 1.15;
  margin: 0 36px 12px 0;
  color: #333333;

  white-space: normal;
  overflow-wrap: break-word;
}

.popup-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  align-items: center;
  font-size: 18px;
  color: #666666;
  margin-bottom: 14px;
}

.popup-meta-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.popup-icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  display: inline-block;
}

.popup-details {
  font-size: 15px;
  line-height: 1.6;
  color: #555555;
}

.popup-details strong {
  color: #333333;
}
</style>
</head>

<body>
<div id="map"></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoicy1wZXJrIiwiYSI6ImNtbWU1amJyZDBiNjcyc3E0bmZubXVwdm8ifQ.-II8pwN1aLKbed_BQXf0cA';

function parseNumber(value) {
  if (value === undefined || value === null) return 0;
  return Number(String(value).replace(/,/g, '').trim()) || 0;
}

function escapeHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [32.3, 0.3],
  zoom: 5
});

map.on('load', () => {
  d3.csv('./Impact_Map_Export%20-%20Sheet1.csv').then(function(data) {

    const features = data
      .filter(d =>
        d.longitude &&
        d.latitude &&
        !isNaN(parseNumber(d.longitude)) &&
        !isNaN(parseNumber(d.latitude))
      )
      .map(d => ({
        type: 'Feature',
        properties: {
          Population: parseNumber(d['Population']),
          name: d['Customer Name'] || '',
          district: d['District'] || '',
          customerId: d['Customer ID'] || '',
          customerType: d['Customer Type'] || '',
          installDate: d['Install Date'] || '',
          systemName: d['System Name'] || '',
          designType: d['Design Type'] || '',
          status: d['Status'] || '',
          systemNumber: d['Customer System Number'] || ''
        },
        geometry: {
          type: 'Point',
          coordinates: [parseNumber(d.longitude), parseNumber(d.latitude)]
        }
      }));

    const geojson = {
      type: 'FeatureCollection',
      features: features
    };

    map.addSource('sites', {
      type: 'geojson',
      data: geojson,
      cluster: true,
      clusterRadius: 150,
      clusterMaxZoom: 13,
      clusterProperties: {
        people: ['+', ['get', 'Population']]
      }
    });

    map.addLayer({
      id: 'clusters',
      type: 'circle',
      source: 'sites',
      filter: ['has', 'point_count'],
      paint: {
        'circle-color': '#E3BC47',
        'circle-stroke-color': '#ffffff',
        'circle-stroke-width': 2,
        'circle-radius': [
          'interpolate',
          ['linear'],
          ['get', 'people'],
          0, 18,
          1000, 26,
          5000, 36,
          10000, 46,
          25000, 60,
          50000, 76,
          100000, 92
        ]
      }
    });

    map.addLayer({
      id: 'cluster-count',
      type: 'symbol',
      source: 'sites',
      filter: ['has', 'point_count'],
      layout: {
        'text-field': [
          'case',
          ['>=', ['get', 'people'], 1000],
          [
            'concat',
            [
              'to-string',
              [
                'case',
                ['>=', ['get', 'people'], 10000],
                ['round', ['/', ['get', 'people'], 1000]],
                ['/', ['round', ['*', ['/', ['get', 'people'], 1000], 10]], 10]
              ]
            ],
            'k'
          ],
          ['to-string', ['round', ['get', 'people']]]
        ],
        'text-size': 18,
        'text-font': ['DIN Offc Pro Medium', 'Arial Unicode MS Bold']
      },
      paint: {
        'text-color': '#000000'
      }
    });

    map.addLayer({
      id: 'points',
      type: 'circle',
      source: 'sites',
      filter: ['!', ['has', 'point_count']],
      paint: {
        'circle-color': '#E3BC47',
        'circle-radius': [
          'interpolate',
          ['linear'],
          ['get', 'Population'],
          0, 5,
          100, 8,
          300, 12,
          600, 16,
          1000, 20
        ],
        'circle-stroke-color': '#ffffff',
        'circle-stroke-width': 2
      }
    });

    map.on('click', 'clusters', (e) => {
      const features = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
      const clusterId = features[0].properties.cluster_id;

      map.getSource('sites').getClusterExpansionZoom(clusterId, (err, zoom) => {
        if (err) return;
        map.easeTo({
          center: features[0].geometry.coordinates,
          zoom: zoom
        });
      });
    });

    map.on('click', 'points', (e) => {
      const props = e.features[0].properties;
      const coords = e.features[0].geometry.coordinates.slice();
      const population = parseNumber(props.Population);

      const checkIcon = `
        <svg class="popup-icon" viewBox="0 0 20 20" aria-hidden="true">
          <circle cx="10" cy="10" r="8.5" fill="none" stroke="#777" stroke-width="1.5"></circle>
          <path d="M6 10.2l2.2 2.2L14 6.8" fill="none" stroke="#777" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      `;

      const personIcon = `
        <svg class="popup-icon" viewBox="0 0 20 20" aria-hidden="true">
          <circle cx="10" cy="6" r="3" fill="#777"></circle>
          <path d="M5 16c0-2.8 2.2-5 5-5s5 2.2 5 5" fill="#777"></path>
        </svg>
      `;

      const popupHtml = `
        <div class="popup-card">
          <div class="popup-title">${escapeHtml(props.name || 'Site')}</div>

          <div class="popup-meta-row">
            <div class="popup-meta-item">
              ${checkIcon}
              <span>${escapeHtml(props.installDate || 'No install date')}</span>
            </div>

            <div class="popup-meta-item">
              ${personIcon}
              <span>${population.toLocaleString()}</span>
            </div>
          </div>

          <div class="popup-details">
            <div><strong>System:</strong> ${escapeHtml(props.systemName || props.designType || 'N/A')}</div>
            <div><strong>System number:</strong> ${escapeHtml(props.systemNumber || 'N/A')}</div>
            <div><strong>Type:</strong> ${escapeHtml(props.customerType || 'N/A')}</div>
            <div><strong>District:</strong> ${escapeHtml(props.district || 'N/A')}</div>
            <div><strong>Customer ID:</strong> ${escapeHtml(props.customerId || 'N/A')}</div>
          </div>
        </div>
      `;

    new mapboxgl.Popup({
      offset: 18,
      maxWidth: "520px"
    })
      .setLngLat(coords)
      .setHTML(popupHtml)
      .addTo(map);

    map.on('mouseenter', 'clusters', () => {
      map.getCanvas().style.cursor = 'pointer';
    });

    map.on('mouseleave', 'clusters', () => {
      map.getCanvas().style.cursor = '';
    });

    map.on('mouseenter', 'points', () => {
      map.getCanvas().style.cursor = 'pointer';
    });

    map.on('mouseleave', 'points', () => {
      map.getCanvas().style.cursor = '';
    });
  });
});
</script>
</body>
</html>
